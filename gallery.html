<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Creations | Pretty Nails Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@300;400;500;600&family=Alex+Brush&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar-header">
        <nav class="navbar">
            <div class="logo-area" onclick="window.location.href='index.html'" style="cursor:pointer;">
                <img src="logo.jpg" alt="Nail Studio Logo" class="nav-logo">
                <div class="logo-text">
                    <span class="cursive-title">Pretty nails studio</span>
                    <span class="sub-title">BY KANVI</span>
                </div>
            </div>
            <ul class="nav-links">
                <li><a href="index.html#home">Home</a></li>
                <li><a href="index.html#services">Services</a></li>
                <li><a href="#portfolio" class="active">Gallery</a></li>
                <li><a href="index.html#testimonials">Reviews</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
            <a href="index.html#booking" class="nav-btn">Book Now</a>
        </nav>
    </header>

    <section id="portfolio" class="portfolio-section" style="min-height: 80vh;">
        <div class="section-title">
            <h2>Our Full Gallery</h2>
            <p>Explore all gorgeous nail arts crafted by Kanvi</p>
        </div>
        <div class="gallery-filters">
            <button class="filter-btn active" data-category="all">All Designs</button>
            <button class="filter-btn" data-category="navratri-nails">Navratri Nails</button>
            <button class="filter-btn" data-category="press-on-nails">Press on Nails</button>
            <button class="filter-btn" data-category="nail-extensions">Nail Extensions</button>
            <button class="filter-btn" data-category="toe-extensions">Toe Extensions</button>
        </div>
        <div class="gallery-grid" id="fullGalleryGrid"></div>
    </section>

    <footer class="site-footer">
        <div class="footer-bottom">
            <p>© 2026 Pretty Nails Studio by Kanvi. Developed with Excellence.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
