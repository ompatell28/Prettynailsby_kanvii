backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "images/gallery"
public_folder: "/images/gallery"

collections:
  - name: "portfolio"
    label: "📷 Manage Gallery Photos"
    folder: "data/portfolio"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Design Title", name: "title", widget: "string" }
      - { label: "Upload Image", name: "image", widget: "image" }
      - { 
          label: "Category", 
          name: "category", 
          widget: "select", 
          options: ["bridal", "acrylic", "gel", "minimalist"] 
        }

  - name: "menu"
    label: "📋 Manage Price Menu"
    folder: "data/menu"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Category (e.g., Nail Services)", name: "category", widget: "string" }
      - { label: "Service Name", name: "item_name", widget: "string" }
      - { label: "Price (e.g., ₹1,999)", name: "price", widget: "string" }
      - { label: "Duration Time (Optional - e.g., 60 Mins)", name: "time", widget: "string", required: false }